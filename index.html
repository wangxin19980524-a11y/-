<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>今天吃什么随机抽选器</title>
  <style>
    :root {
      --ink: #201b16;
      --muted: #71675d;
      --paper: #fff8ec;
      --line: rgba(43, 34, 24, 0.14);
      --red: #d83d2f;
      --gold: #f2b632;
      --green: #3c8b5b;
      --blue: #2b6f88;
      --shadow: 0 18px 45px rgba(65, 43, 24, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(242, 182, 50, 0.3), transparent 26%),
        radial-gradient(circle at 80% 12%, rgba(60, 139, 91, 0.22), transparent 24%),
        linear-gradient(135deg, #fff4dc 0%, #fffaf2 42%, #f4fff5 100%);
    }

    button {
      font: inherit;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    .top {
      display: grid;
      grid-template-columns: minmax(0, 1.02fr) minmax(320px, 0.98fr);
      gap: 22px;
      align-items: stretch;
    }

    .stage,
    .panel,
    .food-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.76);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .stage {
      min-height: 430px;
      padding: 28px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      position: relative;
      overflow: hidden;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: auto -80px -120px auto;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: rgba(216, 61, 47, 0.08);
      pointer-events: none;
    }

    .kicker {
      margin: 0 0 8px;
      color: var(--green);
      font-size: 14px;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 62px);
      line-height: 1.04;
      letter-spacing: 0;
    }

    .sub {
      margin: 14px 0 0;
      max-width: 520px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .result-wrap {
      display: grid;
      align-content: center;
      justify-items: start;
      min-height: 210px;
      padding: 24px 0;
    }

    .result-label {
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
    }

    .result {
      margin-top: 12px;
      min-height: 96px;
      color: var(--red);
      font-size: clamp(36px, 6vw, 70px);
      font-weight: 900;
      line-height: 1.12;
      text-wrap: balance;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .result.pulse {
      transform: scale(1.04) rotate(-1deg);
    }

    .note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .pick-btn,
    .ghost-btn {
      min-height: 48px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 900;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .pick-btn {
      padding: 0 22px;
      color: white;
      background: linear-gradient(135deg, #d83d2f, #f2a531);
      box-shadow: 0 12px 24px rgba(216, 61, 47, 0.28);
    }

    .ghost-btn {
      padding: 0 18px;
      color: var(--ink);
      background: #fff3d5;
      border: 1px solid rgba(43, 34, 24, 0.12);
    }

    .pick-btn:hover,
    .ghost-btn:hover {
      transform: translateY(-2px);
    }

    .pick-btn:disabled {
      cursor: wait;
      opacity: 0.72;
      transform: none;
    }

    .panel {
      padding: 22px;
      display: grid;
      gap: 16px;
      align-content: start;
      overflow: hidden;
    }

    .wheel {
      position: relative;
      width: min(100%, 360px);
      aspect-ratio: 1;
      margin: 0 auto;
      border-radius: 50%;
      background:
        conic-gradient(
          #d83d2f 0deg 21deg,
          #f2b632 21deg 42deg,
          #3c8b5b 42deg 63deg,
          #2b6f88 63deg 84deg,
          #ef7c34 84deg 105deg,
          #cf594f 105deg 126deg,
          #77a95b 126deg 147deg,
          #8f5a40 147deg 168deg,
          #d83d2f 168deg 189deg,
          #f2b632 189deg 210deg,
          #3c8b5b 210deg 231deg,
          #2b6f88 231deg 252deg,
          #ef7c34 252deg 273deg,
          #cf594f 273deg 294deg,
          #77a95b 294deg 315deg,
          #8f5a40 315deg 336deg,
          #d83d2f 336deg 360deg
        );
      box-shadow: inset 0 0 0 14px rgba(255, 255, 255, 0.58), 0 18px 34px rgba(65, 43, 24, 0.17);
      transform: rotate(var(--spin, 0deg));
      transition: transform 1.8s cubic-bezier(.14,.74,.12,1);
    }

    .wheel::after {
      content: "";
      position: absolute;
      inset: 27%;
      border-radius: 50%;
      background: #fff8ec;
      box-shadow: inset 0 0 0 1px var(--line);
      z-index: 0;
    }

    .wheel-food {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 2;
      font-size: clamp(72px, 12vw, 116px);
      filter: drop-shadow(0 8px 0 rgba(80, 45, 20, 0.09));
      transform: rotate(calc(var(--spin, 0deg) * -1));
      transition: transform 1.8s cubic-bezier(.14,.74,.12,1);
    }

    .pointer {
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 30px solid var(--ink);
      margin: -2px auto 0;
      filter: drop-shadow(0 5px 4px rgba(0, 0, 0, 0.18));
    }

    .mini-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .mini {
      min-height: 38px;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(255, 248, 236, 0.82);
      color: #4f463d;
      font-size: 13px;
      font-weight: 750;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      margin: 26px 0 14px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
    }

    .count {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .food-card {
      min-height: 174px;
      padding: 14px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 12px 28px rgba(65, 43, 24, 0.12);
    }

    .food-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent-soft), transparent 64%);
      opacity: 0.88;
      pointer-events: none;
    }

    .food-card.active {
      border-color: rgba(216, 61, 47, 0.42);
      box-shadow: 0 18px 36px rgba(216, 61, 47, 0.2);
    }

    .food-name,
    .food-desc,
    .badge,
    .sticker {
      position: relative;
      z-index: 1;
    }

    .food-name {
      margin: 0;
      font-size: 17px;
      line-height: 1.25;
      font-weight: 900;
    }

    .food-desc {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .badge {
      width: max-content;
      max-width: 100%;
      padding: 5px 9px;
      border-radius: 999px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid rgba(43, 34, 24, 0.1);
      font-size: 12px;
      font-weight: 850;
    }

    .sticker {
      justify-self: end;
      align-self: start;
      width: 78px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      font-size: 38px;
      box-shadow: 0 10px 0 rgba(32, 27, 22, 0.08), inset 0 -10px 0 rgba(32, 27, 22, 0.09);
      transform: rotate(3deg);
    }

    .sticker::after {
      content: "";
      position: absolute;
      right: 8px;
      top: 8px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.68);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(120px);
      width: min(520px, calc(100% - 32px));
      padding: 14px 18px;
      border-radius: 8px;
      color: white;
      background: rgba(32, 27, 22, 0.92);
      box-shadow: 0 18px 38px rgba(32, 27, 22, 0.25);
      font-weight: 800;
      text-align: center;
      transition: transform 0.25s ease;
      z-index: 10;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 930px) {
      .top {
        grid-template-columns: 1fr;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .app {
        width: min(100% - 20px, 1180px);
        padding-top: 14px;
      }

      .stage,
      .panel {
        padding: 18px;
      }

      .stage {
        min-height: 380px;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr;
      }

      .pick-btn,
      .ghost-btn {
        width: 100%;
      }

      .mini-list,
      .grid {
        grid-template-columns: 1fr;
      }

      .food-card {
        min-height: 154px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="top" aria-label="随机抽选">
      <div class="stage">
        <div>
          <p class="kicker">DINNER DRAW</p>
          <h1>今天吃什么？</h1>
          <p class="sub">别让“吃啥”拖垮今晚的含金量。把选择交给按钮，抽到哪个就哪个，主打一个不内耗。</p>
        </div>

        <div class="result-wrap">
          <div class="result-label">今晚安排</div>
          <div id="result" class="result">先抽一把</div>
          <div id="resultNote" class="note">点下面的按钮，系统替你拍板。抽到不许嘴硬，最多再来一次。</div>
        </div>

        <div class="actions">
          <button id="pickBtn" class="pick-btn" type="button">开抽，别纠结</button>
          <button id="againBtn" class="ghost-btn" type="button">再来一次</button>
        </div>
      </div>

      <aside class="panel" aria-label="抽选转盘">
        <div class="wheel" id="wheel">
          <div class="wheel-food" id="wheelFood">🍲</div>
        </div>
        <div class="pointer" aria-hidden="true"></div>
        <div class="mini-list" id="miniList"></div>
      </aside>
    </section>

    <div class="section-title">
          <h2>今晚备选池</h2>
      <div class="count">17 个选择</div>
    </div>

    <section class="grid" id="foodGrid" aria-label="候选菜单列表"></section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    const foods = [
      { name: "碳香老火锅", icon: "🔥", tag: "炭火锅气", desc: "红汤翻滚，适合想吃重口热辣的夜晚。", accent: "#d83d2f", soft: "rgba(216,61,47,.18)" },
      { name: "川井巷四川火锅", icon: "🌶️", tag: "川味麻辣", desc: "巷子感四川锅，麻辣鲜香，越涮越上头。", accent: "#c7352b", soft: "rgba(199,53,43,.18)" },
      { name: "老板恋上鱼", icon: "🐟", tag: "鱼香开胃", desc: "鱼肉鲜嫩，汤汁浓，适合想吃热乎鱼菜。", accent: "#2b6f88", soft: "rgba(43,111,136,.18)" },
      { name: "麦当劳", icon: "🍔", tag: "快速快乐", desc: "汉堡薯条可乐到位，今天就先快乐一下。", accent: "#e2a21a", soft: "rgba(226,162,26,.22)" },
      { name: "肯德基", icon: "🍗", tag: "炸鸡能量", desc: "外酥里嫩，适合需要一点脆皮回血的时候。", accent: "#d34434", soft: "rgba(211,68,52,.18)" },
      { name: "兰州拉面", icon: "🍜", tag: "清爽热汤", desc: "一碗热汤面，简单、快、管饱，不整花活。", accent: "#3c8b5b", soft: "rgba(60,139,91,.18)" },
      { name: "龙歌自助火锅", icon: "🥘", tag: "自助畅吃", desc: "选择困难就交给自助，想吃几样吃几样。", accent: "#b94c2f", soft: "rgba(185,76,47,.18)" },
      { name: "汉巴味德", icon: "🥩", tag: "烤肉自助", desc: "肉香和满足感都很直接，饿得认真就选它。", accent: "#8f5a40", soft: "rgba(143,90,64,.19)" },
      { name: "麻辣香锅", icon: "🥢", tag: "想吃啥夹啥", desc: "蔬菜肉丸自由搭配，一锅端走所有嘴馋。", accent: "#cf594f", soft: "rgba(207,89,79,.18)" },
      { name: "比格披萨", icon: "🍕", tag: "芝士拉满", desc: "披萨甜品饮料都有，轻松聊天不冷场。", accent: "#ef7c34", soft: "rgba(239,124,52,.19)" },
      { name: "徐升记不改良老火锅", icon: "🍲", tag: "传统老味", desc: "不改良老火锅，想吃原味辣锅就别绕路。", accent: "#a92f28", soft: "rgba(169,47,40,.18)" },
      { name: "东门烤肉", icon: "🥓", tag: "滋滋冒油", desc: "铁盘一热，香气直接上桌，适合边烤边聊。", accent: "#8a5138", soft: "rgba(138,81,56,.18)" },
      { name: "烤羊腿", icon: "🍖", tag: "硬菜仪式感", desc: "外焦里嫩，分量感强，今天可以稍微豪横。", accent: "#9f623b", soft: "rgba(159,98,59,.18)" },
      { name: "鸡公煲", icon: "🐔", tag: "浓香下饭", desc: "鸡肉酱香配米饭，属于吃完很踏实那种。", accent: "#bd6a2f", soft: "rgba(189,106,47,.19)" },
      { name: "茅庐川菜", icon: "🥬", tag: "川菜下饭", desc: "水煮、干锅、家常辣味，认真吃饭很合适。", accent: "#77a95b", soft: "rgba(119,169,91,.2)" },
      { name: "厨大匠烤肘子", icon: "🍽️", tag: "焦香肘子", desc: "外皮焦香，肉感扎实，适合想吃一口硬菜。", accent: "#7c4a34", soft: "rgba(124,74,52,.18)" },
      { name: "聚义友家常菜", icon: "🥗", tag: "舒服家常", desc: "不折腾、好入口，适合回归朴素的一顿饭。", accent: "#4c9a6a", soft: "rgba(76,154,106,.18)" }
    ];

    const result = document.querySelector("#result");
    const resultNote = document.querySelector("#resultNote");
    const pickBtn = document.querySelector("#pickBtn");
    const againBtn = document.querySelector("#againBtn");
    const wheel = document.querySelector("#wheel");
    const wheelFood = document.querySelector("#wheelFood");
    const grid = document.querySelector("#foodGrid");
    const miniList = document.querySelector("#miniList");
    const toast = document.querySelector("#toast");

    let currentIndex = -1;
    let spin = 0;
    let timer = null;

    function renderFoods() {
      grid.innerHTML = foods.map((food, index) => `
        <article class="food-card" data-index="${index}" style="--accent:${food.accent}; --accent-soft:${food.soft}">
          <div class="sticker" aria-hidden="true">${food.icon}</div>
          <h3 class="food-name">${food.name}</h3>
          <p class="food-desc">${food.desc}</p>
          <div class="badge">${food.tag}</div>
        </article>
      `).join("");

      miniList.innerHTML = foods.slice(0, 8).map(food => `<div class="mini">${food.icon} ${food.name}</div>`).join("");
    }

    function setActive(index) {
      document.querySelectorAll(".food-card").forEach(card => {
        card.classList.toggle("active", Number(card.dataset.index) === index);
      });
    }

    function randomIndex() {
      if (foods.length <= 1) return 0;
      let next = Math.floor(Math.random() * foods.length);
      while (next === currentIndex) {
        next = Math.floor(Math.random() * foods.length);
      }
      return next;
    }

    function showToast(food) {
      toast.textContent = `就它了：${food.name}。${food.tag}，今晚先把内耗停一下。`;
      toast.classList.add("show");
      clearTimeout(timer);
      timer = setTimeout(() => toast.classList.remove("show"), 2400);
    }

    function pick() {
      const index = randomIndex();
      const food = foods[index];
      currentIndex = index;
      spin += 1080 + Math.round((360 / foods.length) * index) + Math.floor(Math.random() * 40);

      pickBtn.disabled = true;
      result.classList.remove("pulse");
      result.textContent = "抽选中...";
      resultNote.textContent = "别急，菜单正在加载今晚的命运。";
      wheel.style.setProperty("--spin", `${spin}deg`);
      wheelFood.textContent = food.icon;
      setActive(index);

      window.setTimeout(() => {
        result.textContent = food.name;
        resultNote.textContent = `${food.tag}：${food.desc}`;
        result.classList.add("pulse");
        pickBtn.disabled = false;
        showToast(food);
      }, 1050);
    }

    pickBtn.addEventListener("click", pick);
    againBtn.addEventListener("click", pick);
    renderFoods();
  </script>
</body>
</html>
